<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>발표 개요 (Agenda)</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Noto Sans KR', sans-serif; }
        .slide { width: 1920px; height: 1080px; }
        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .agenda-item {
            transition: all 0.3s ease;
        }
        .agenda-item:hover {
            transform: translateX(10px);
        }
    </style>
</head>
<body class="m-0 p-0 overflow-hidden">
    <div class="slide gradient-bg relative p-16">
        <!-- Header -->
        <div class="flex items-center mb-12">
            <div class="bg-gradient-to-r from-blue-600 to-cyan-500 rounded-2xl px-8 py-4">
                <h1 class="text-5xl font-bold text-white">
                    <i class="fas fa-list-ul mr-4"></i>발표 개요
                </h1>
            </div>
            <div class="flex-1 h-1 bg-gradient-to-r from-cyan-500 to-transparent ml-8"></div>
        </div>
        
        <!-- Agenda Items Grid -->
        <div class="grid grid-cols-3 gap-6 mt-8">
            <!-- Part 1 -->
            <div class="agenda-item bg-gradient-to-br from-blue-900/60 to-blue-800/40 rounded-2xl p-6 border border-blue-500/30">
                <div class="flex items-center mb-4">
                    <span class="bg-blue-500 text-white text-2xl font-bold w-12 h-12 rounded-full flex items-center justify-center mr-4">1</span>
                    <h3 class="text-2xl font-bold text-white">서론 및 배경</h3>
                </div>
                <p class="text-gray-300 text-lg"><i class="fas fa-question-circle mr-2 text-blue-400"></i>왜 AI 기반 공력 예측인가?</p>
            </div>
            
            <!-- Part 2 -->
            <div class="agenda-item bg-gradient-to-br from-cyan-900/60 to-cyan-800/40 rounded-2xl p-6 border border-cyan-500/30">
                <div class="flex items-center mb-4">
                    <span class="bg-cyan-500 text-white text-2xl font-bold w-12 h-12 rounded-full flex items-center justify-center mr-4">2</span>
                    <h3 class="text-2xl font-bold text-white">데이터 수집</h3>
                </div>
                <p class="text-gray-300 text-lg"><i class="fas fa-satellite-dish mr-2 text-cyan-400"></i>센서 시스템 구성</p>
            </div>
            
            <!-- Part 3 -->
            <div class="agenda-item bg-gradient-to-br from-teal-900/60 to-teal-800/40 rounded-2xl p-6 border border-teal-500/30">
                <div class="flex items-center mb-4">
                    <span class="bg-teal-500 text-white text-2xl font-bold w-12 h-12 rounded-full flex items-center justify-center mr-4">3</span>
                    <h3 class="text-2xl font-bold text-white">최신 연구 동향</h3>
                </div>
                <p class="text-gray-300 text-lg"><i class="fas fa-book mr-2 text-teal-400"></i>2018-2025 연구 리뷰</p>
            </div>
            
            <!-- Part 4 -->
            <div class="agenda-item bg-gradient-to-br from-emerald-900/60 to-emerald-800/40 rounded-2xl p-6 border border-emerald-500/30">
                <div class="flex items-center mb-4">
                    <span class="bg-emerald-500 text-white text-2xl font-bold w-12 h-12 rounded-full flex items-center justify-center mr-4">4</span>
                    <h3 class="text-2xl font-bold text-white">신경망 아키텍처</h3>
                </div>
                <p class="text-gray-300 text-lg"><i class="fas fa-network-wired mr-2 text-emerald-400"></i>MLP, RNN, PINN 등</p>
            </div>
            
            <!-- Part 5 -->
            <div class="agenda-item bg-gradient-to-br from-green-900/60 to-green-800/40 rounded-2xl p-6 border border-green-500/30">
                <div class="flex items-center mb-4">
                    <span class="bg-green-500 text-white text-2xl font-bold w-12 h-12 rounded-full flex items-center justify-center mr-4">5</span>
                    <h3 class="text-2xl font-bold text-white">현장 테스트</h3>
                </div>
                <p class="text-gray-300 text-lg"><i class="fas fa-plane-departure mr-2 text-green-400"></i>데이터셋 구축 방법론</p>
            </div>
            
            <!-- Part 6 -->
            <div class="agenda-item bg-gradient-to-br from-lime-900/60 to-lime-800/40 rounded-2xl p-6 border border-lime-500/30">
                <div class="flex items-center mb-4">
                    <span class="bg-lime-500 text-white text-2xl font-bold w-12 h-12 rounded-full flex items-center justify-center mr-4">6</span>
                    <h3 class="text-2xl font-bold text-white">검증 방법</h3>
                </div>
                <p class="text-gray-300 text-lg"><i class="fas fa-check-double mr-2 text-lime-400"></i>모델 성능 평가 전략</p>
            </div>
            
            <!-- Part 7 -->
            <div class="agenda-item bg-gradient-to-br from-yellow-900/60 to-yellow-800/40 rounded-2xl p-6 border border-yellow-500/30">
                <div class="flex items-center mb-4">
                    <span class="bg-yellow-500 text-white text-2xl font-bold w-12 h-12 rounded-full flex items-center justify-center mr-4">7</span>
                    <h3 class="text-2xl font-bold text-white">장단점 분석</h3>
                </div>
                <p class="text-gray-300 text-lg"><i class="fas fa-balance-scale mr-2 text-yellow-400"></i>AI vs 전통 방법</p>
            </div>
            
            <!-- Part 8 -->
            <div class="agenda-item bg-gradient-to-br from-orange-900/60 to-orange-800/40 rounded-2xl p-6 border border-orange-500/30">
                <div class="flex items-center mb-4">
                    <span class="bg-orange-500 text-white text-2xl font-bold w-12 h-12 rounded-full flex items-center justify-center mr-4">8</span>
                    <h3 class="text-2xl font-bold text-white">구현 전략</h3>
                </div>
                <p class="text-gray-300 text-lg"><i class="fas fa-rocket mr-2 text-orange-400"></i>스타트업 환경 적용</p>
            </div>
            
            <!-- Part 9 -->
            <div class="agenda-item bg-gradient-to-br from-red-900/60 to-red-800/40 rounded-2xl p-6 border border-red-500/30">
                <div class="flex items-center mb-4">
                    <span class="bg-red-500 text-white text-2xl font-bold w-12 h-12 rounded-full flex items-center justify-center mr-4">9</span>
                    <h3 class="text-2xl font-bold text-white">결론</h3>
                </div>
                <p class="text-gray-300 text-lg"><i class="fas fa-flag-checkered mr-2 text-red-400"></i>핵심 요약 및 향후 방향</p>
            </div>
        </div>
        
        <!-- Timeline -->
        <div class="absolute bottom-16 left-16 right-16">
            <div class="flex items-center justify-between bg-slate-800/50 rounded-full px-8 py-4">
                <span class="text-gray-400 text-xl"><i class="far fa-clock mr-2"></i>예상 발표 시간</span>
                <div class="flex items-center gap-4">
                    <span class="text-cyan-400 text-xl font-bold">90 ~ 120분</span>
                    <span class="text-gray-500">|</span>
                    <span class="text-gray-400 text-xl">총 40개 슬라이드</span>
                </div>
            </div>
        </div>
        
        <!-- Slide Number -->
        <div class="absolute bottom-8 right-8 text-gray-500 text-xl">2 / 40</div>
    </div>
</body>
</html>
